<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SaveImageToLink Minimal Prototype</title>
  <style>
    :root {
      --blue: #0071e3;
      --text: #1d1d1f;
      --muted: #6e6e73;
      --line: #e5e5ea;
      --bg: #eef1f5;
      --panel: #fff;
      --soft: #f5f5f7;
      --green: #10883f;
      --green-bg: #eaf8ef;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      letter-spacing: 0;
    }

    .window {
      width: 420px;
      border: 1px solid rgba(0,0,0,.12);
      border-radius: 18px;
      overflow: hidden;
      background: var(--panel);
      box-shadow: 0 18px 48px rgba(0,0,0,.16);
    }

    .titlebar {
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      border-bottom: 1px solid var(--line);
      background: #fbfbfd;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    .title-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon, .mark {
      display: grid;
      place-items: center;
      border: 1px solid rgba(0,113,227,.18);
      background: #f8fbff;
    }

    .icon {
      width: 22px;
      height: 22px;
      border-radius: 7px;
    }

    .mark {
      width: 44px;
      height: 44px;
      border-radius: 13px;
    }

    svg { width: 70%; height: 70%; }

    .dots { display: flex; gap: 7px; }
    .dot {
      width: 9px;
      height: 9px;
      border-radius: 99px;
      background: #d1d1d6;
    }

    .content {
      padding: 24px;
    }

    .head {
      display: flex;
      align-items: center;
      gap: 13px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.1;
      font-weight: 750;
    }

    .sub {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .status {
      padding: 9px 11px;
      margin-bottom: 18px;
      border-radius: 11px;
      background: var(--green-bg);
      color: var(--green);
      font-size: 13px;
      font-weight: 700;
    }

    .field { margin-top: 14px; }

    label {
      display: block;
      margin-bottom: 7px;
      font-size: 13px;
      font-weight: 700;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 72px;
      gap: 8px;
    }

    .input, .select {
      height: 40px;
      width: 100%;
      padding: 0 12px;
      border: 1px solid #d7d7dc;
      border-radius: 10px;
      background: white;
      color: var(--text);
      font: 14px/1 var(--font);
      outline: none;
    }

    .hint {
      margin-top: 7px;
      color: var(--muted);
      font-size: 12px;
    }

    .primary {
      width: 100%;
      height: 44px;
      margin-top: 20px;
      border: 0;
      border-radius: 999px;
      background: var(--blue);
      color: white;
      font: 750 14px/1 var(--font);
      box-shadow: 0 8px 18px rgba(0,113,227,.22);
    }

    .secondary-row {
      display: flex;
      justify-content: center;
      gap: 18px;
      margin-top: 14px;
      color: var(--blue);
      font-size: 13px;
      font-weight: 650;
    }

    .secondary-row span {
      white-space: nowrap;
    }

    .button-small {
      height: 40px;
      border: 1px solid #d7d7dc;
      border-radius: 999px;
      background: white;
      color: var(--text);
      font: 650 13px/1 var(--font);
    }
  </style>
</head>
<body>
  <main class="window">
    <div class="titlebar">
      <div class="title-left">
        <span class="icon">
          <svg viewBox="0 0 64 64" fill="none"><rect x="9" y="12" width="46" height="35" rx="7" fill="#fff" stroke="#0071e3" stroke-width="4"/><path d="M14 41L25 30L33 38L39 32L51 45" stroke="#34c759" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><circle cx="43" cy="22" r="5" fill="#0071e3"/></svg>
        </span>
        SaveImageToLink
      </div>
      <div class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
    </div>

    <section class="content">
      <div class="head">
        <span class="mark">
          <svg viewBox="0 0 64 64" fill="none"><rect x="9" y="12" width="46" height="35" rx="7" fill="#fff" stroke="#0071e3" stroke-width="4"/><path d="M14 41L25 30L33 38L39 32L51 45" stroke="#34c759" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><circle cx="43" cy="22" r="5" fill="#0071e3"/></svg>
        </span>
        <div>
          <h1>SaveImageToLink</h1>
          <p class="sub">保存截图，复制图片引用。</p>
        </div>
      </div>

      <div class="status">右键菜单未安装</div>

      <div class="field">
        <label>保存到</label>
        <div class="row">
          <input class="input" value="%USERPROFILE%\\Pictures\\SaveImageToLink">
          <button class="button-small">选择</button>
        </div>
      </div>

      <div class="field">
        <label>复制为</label>
        <select class="select">
          <option>Markdown 图片（推荐）</option>
          <option>纯路径</option>
          <option>文件链接 file://</option>
        </select>
        <div class="hint">适合 Obsidian 和 Markdown 文档。</div>
      </div>

      <button class="primary">安装并启用</button>

      <div class="secondary-row">
        <span>测试保存</span>
        <span>打开目录</span>
        <span>卸载</span>
      </div>
    </section>
  </main>
</body>
</html>
